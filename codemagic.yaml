workflows:
  android-build:
    name: Android Build
    max_build_duration: 30
    environment:
      java: 17
      node: 18
      groups:
        - android_keystore
    scripts:
      - name: Install dependencies
        script: |
          cd web
          npm install
      - name: Prepare web directory
        script: |
          cd web
          mkdir -p out
          echo "<html><body>Loading...</body></html>" > out/index.html
      - name: Sync Capacitor
        script: |
          cd web
          npx cap sync android
      - name: Decode keystore
        script: |
          echo $KEYSTORE_BASE64 | base64 --decode > /tmp/vocavision-upload.jks
      - name: Build signed Android AAB
        script: |
          cd web/android
          chmod +x gradlew
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=/tmp/vocavision-upload.jks \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD
    artifacts:
      - web/android/app/build/outputs/**/*.aab
